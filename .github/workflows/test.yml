name: Cypress E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        with:
          # Build the Next.js production application first
          build: npm run build
          # Start the Next.js local server
          dev: npm run dev
          # Wait for the Next.js server to respond before launching tests
          wait-on: 'http://localhost:3000'
          # Maximum time (in seconds) to wait for the server to be ready
          wait-on-timeout: 120
